name: Build Android APK
run-name: ${{ github.event.inputs.repository || github.repository }} :${{ github.event.inputs.taskName }}

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Git repository (owner/repo, kosongkan untuk repo ini)"
        required: false
        default: ""
      branchName:
        description: "Git branch name (kosongkan untuk main)"
        required: false
        default: ""
      subdir:
        description: "Subdirectory path jika project nested"
        required: false
        default: ""
      jdkVersion:
        description: "OpenJDK version"
        required: false
        default: "17"
      taskName:
        description: "Gradle task"
        required: false
        default: "assembleStandardRelease"

env:
  REPO: ${{ github.event.inputs.repository || github.repository }}
  BRANCH: ${{ github.event.inputs.branchName || 'main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ github.event.inputs.jdkVersion }}

      - name: Clone project
        run: |
          git clone --recurse-submodules --depth=1 \
            --branch ${{ env.BRANCH }} \
            https://github.com/${{ env.REPO }} workspace

      - name: Build APK
        working-directory: ./workspace/${{ github.event.inputs.subdir }}
        run: |
          if [ ! -f "gradlew" ]; then gradle wrapper; fi
          chmod +x gradlew

          if [[ "${{ github.event.inputs.taskName }}" == *Release* ]]; then
            echo "Task contains 'Release', attempting to sign a release build with a debug key."

            if [ ! -f "$HOME/.android/debug.keystore" ]; then
              echo "Debug keystore not found. Creating one..."
              keytool -genkey -v -keystore debug.keystore -storepass android \
                -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
                -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
              mkdir -p $HOME/.android
              mv debug.keystore $HOME/.android/debug.keystore
            fi

            ./gradlew ${{ github.event.inputs.taskName }} \
              -Pandroid.injected.signing.store.file="$HOME/.android/debug.keystore" \
              -Pandroid.injected.signing.store.password=android \
              -Pandroid.injected.signing.key.alias=androiddebugkey \
              -Pandroid.injected.signing.key.password=android \
              --stacktrace
          else
            ./gradlew ${{ github.event.inputs.taskName }} --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          path: workspace/**/*.apk
          name: apk-archive
          retention-days: 1
